<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="300" height="180">
  <!-- sky background -->
  <rect width="300" height="180" rx="8" fill="#e8f5e9"/>
  <!-- ground -->
  <rect y="130" width="300" height="50" rx="0" fill="#8bc34a"/>
  <rect y="125" width="300" height="10" fill="#9ccc65"/>
  <!-- sun -->
  <circle cx="255" cy="40" r="22" fill="#fdd835"/>
  <circle cx="255" cy="40" r="18" fill="#ffee58"/>
  <!-- clouds -->
  <ellipse cx="60" cy="35" rx="28" ry="12" fill="#fff" opacity="0.7"/>
  <ellipse cx="80" cy="30" rx="22" ry="10" fill="#fff" opacity="0.7"/>
  <ellipse cx="170" cy="45" rx="24" ry="10" fill="#fff" opacity="0.6"/>
  <!-- tortoise body -->
  <ellipse cx="140" cy="115" rx="45" ry="22" fill="#5d4037"/>
  <!-- shell -->
  <ellipse cx="140" cy="105" rx="42" ry="28" fill="#2e7d32"/>
  <ellipse cx="140" cy="105" rx="38" ry="24" fill="#388e3c"/>
  <!-- shell pattern -->
  <path d="M120 85 L125 105 L115 120" stroke="#2e7d32" stroke-width="2" fill="none"/>
  <path d="M140 82 L140 105 L140 125" stroke="#2e7d32" stroke-width="2" fill="none"/>
  <path d="M160 85 L155 105 L165 120" stroke="#2e7d32" stroke-width="2" fill="none"/>
  <path d="M105 100 L140 95 L175 100" stroke="#2e7d32" stroke-width="2" fill="none"/>
  <path d="M108 112 L140 108 L172 112" stroke="#2e7d32" stroke-width="2" fill="none"/>
  <!-- head -->
  <ellipse cx="188" cy="112" rx="14" ry="11" fill="#8d6e63"/>
  <circle cx="193" cy="108" r="2.5" fill="#111"/>
  <path d="M198 114 Q200 112 198 110" stroke="#111" stroke-width="1" fill="none"/>
  <!-- legs -->
  <ellipse cx="112" cy="128" rx="8" ry="5" fill="#8d6e63"/>
  <ellipse cx="168" cy="128" rx="8" ry="5" fill="#8d6e63"/>
  <ellipse cx="118" cy="130" rx="6" ry="4" fill="#795548"/>
  <ellipse cx="162" cy="130" rx="6" ry="4" fill="#795548"/>
  <!-- tail -->
  <path d="M98 115 Q90 112 92 118" stroke="#8d6e63" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- scattered mahjong tiles on ground -->
  <rect x="30" y="140" width="14" height="18" rx="2" fill="#fff" stroke="#ccc" stroke-width="0.5" transform="rotate(-8 37 149)"/>
  <text x="34" y="153" font-size="10" fill="#333" transform="rotate(-8 37 149)">&#x1F019;</text>
  <rect x="210" y="142" width="14" height="18" rx="2" fill="#fff" stroke="#ccc" stroke-width="0.5" transform="rotate(5 217 151)"/>
  <text x="213" y="155" font-size="10" fill="#333" transform="rotate(5 217 151)">&#x1F010;</text>
  <rect x="250" y="138" width="14" height="18" rx="2" fill="#fff" stroke="#ccc" stroke-width="0.5" transform="rotate(-3 257 147)"/>
  <text x="253" y="151" font-size="10" fill="#333" transform="rotate(-3 257 147)">&#x1F01B;</text>
  <!-- title text -->
  <text x="150" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#33691e" font-weight="bold">Catch the Tortoise!</text>
</svg>